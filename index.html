<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="陈纬 · AI 工程技术文档（训练 / 部署 / RAG / Agent）" />
  <title>陈纬 · 技术文档</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root { --theme-color: #2563eb; }
    .app-name-link img { max-height: 2rem; }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    window.$docsify = {
      name: "陈纬 · 技术文档",
      repo: "chenweidu666/chenwei-tech-docs",
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      search: {
        paths: "auto",
        placeholder: "搜索文档…",
        noData: "无结果",
        depth: 4,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(function (hook) {
      hook.beforeEach(function (content) {
        return content.replace(/```mermaid\n([\s\S]*?)```/g, function (_, code) {
          return (
            '<div class="mermaid">' +
            code.replace(/^\n+|\n+$/g, "") +
            "</div>"
          );
        });
      });
      hook.doneEach(function () {
        if (typeof mermaid !== "undefined" && mermaid.run) {
          mermaid.run({ querySelector: ".mermaid" });
        }
      });
    });
  </script>
</body>
</html>
